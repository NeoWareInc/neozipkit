name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - run: yarn install --immutable

      - run: yarn build

      - run: yarn test:unit
