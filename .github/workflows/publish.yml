# Release flow:
#   • Actions → Publish → "Run workflow" = rehearse: build, test, optional npm --dry-run (no upload, no release).
#   • Push tag v* = real publish + GitHub release (uses environment npm-publish).
#
# Authentication (pick one):
#   A) npm Trusted Publishing (recommended): configure OIDC on npmjs.com — no NPM_TOKEN in GitHub.
#      Requires Node ≥ 22.14 (see https://docs.npmjs.com/trusted-publishers ).
#   B) Classic token: GitHub → Settings → Environments → npm-publish → Environment secrets
#      (recommended) OR Settings → Secrets and variables → Actions → Repository secrets —
#      name NPM_TOKEN. Workflow sets NODE_AUTH_TOKEN + YARN_NPM_AUTH_TOKEN.
#
# One-time npm setup for OIDC (repeat per package on npmjs.com):
#   Package → Settings → Trusted publishers → GitHub Actions
#   (this repo, workflow publish.yml, Environment name: npm-publish — must match the job below)
#
# GitHub UI: Settings → Environments (create npm-publish); Secrets and variables → Actions (repo secrets).

name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      npm_dry_run:
        description: 'Run npm publish --dry-run for both packages (shows packed files; no upload)'
        type: boolean
        default: true

jobs:
  rehearse:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - run: yarn install --immutable

      - run: yarn build

      - run: yarn test:quick

      - name: Show package versions (would publish)
        run: |
          echo "neozipkit:        $(node -p "require('./packages/neozipkit/package.json').name")@$(node -p "require('./packages/neozipkit/package.json').version")"
          echo "neozip-blockchain: $(node -p "require('./packages/neozip-blockchain/package.json').name")@$(node -p "require('./packages/neozip-blockchain/package.json').version")"

      - name: Preview neozipkit (npm publish --dry-run)
        if: inputs.npm_dry_run
        working-directory: packages/neozipkit
        # Use npm (not `yarn npm publish`) so the file list matches the real npm tarball.
        run: npm publish --access public --dry-run

      - name: Preview neozip-blockchain (npm publish --dry-run)
        if: inputs.npm_dry_run
        working-directory: packages/neozip-blockchain
        # Use npm here (not `yarn npm publish`): Yarn's dry-run can list extra README paths; npm matches the real tarball.
        run: npm publish --access public --dry-run

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    concurrency:
      group: npm-publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - run: yarn install --immutable

      - run: yarn build

      - run: yarn test:quick

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER_KIT=$(node -p "require('./packages/neozipkit/package.json').version")
          VER_BC=$(node -p "require('./packages/neozip-blockchain/package.json').version")
          if [ "$TAG" != "$VER_KIT" ] || [ "$TAG" != "$VER_BC" ]; then
            echo "::error::Tag v$TAG does not match package versions (neozipkit=$VER_KIT, neozip-blockchain=$VER_BC)"
            exit 1
          fi
          echo "Tag v$TAG matches both package versions."

      # Classic token: add NPM_TOKEN (Environment secret on npm-publish or repository secret).
      # OIDC: leave NPM_TOKEN unset; Trusted Publishing must be configured on npm for both packages.
      - name: Publish neozipkit
        working-directory: packages/neozipkit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn npm publish --access public

      - name: Publish neozip-blockchain
        working-directory: packages/neozip-blockchain
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn npm publish --access public

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
